services:
  - type: web
    name: shl-assessment-agent-1
    env: python
    region: oregon
    plan: free
    rootDir: shl-agent
    buildCommand: bash render-build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: RETRIEVAL_TOP_K
        value: "25"
      - key: LLM_MAX_TOKENS
        value: "1400"
      - key: LLM_TEMPERATURE
        value: "0.05"
      - key: PYTHONUNBUFFERED
        value: "1"
